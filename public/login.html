<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#10151b">
<title>Field CRM — Sign in</title>
<style>
  :root{--ink:#10151b;--panel:#1a212a;--panel2:#232d38;--line:#31404f;--text:#eaf0f5;--muted:#93a5b5;--accent:#4FC3F7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--ink);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 24px;width:360px;max-width:100%}
  h1{font-size:18px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  h1 span{color:var(--accent)}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:13px;font-size:16px;margin-bottom:14px}
  button{width:100%;background:var(--accent);border:0;color:#0d1319;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer}
  .err{color:#f38d80;font-size:13px;height:18px;margin-top:10px;text-align:center}
</style>
</head>
<body>
<form class="box" id="f">
  <h1>Field <span>CRM</span></h1>
  <div class="sub">Sales rep sign-in</div>
  <label for="pw">Team password</label>
  <input id="pw" type="password" autocomplete="current-password" autofocus>
  <button type="submit">Sign in</button>
  <div class="err" id="err"></div>
</form>
<script>
document.getElementById('f').addEventListener('submit', async function(e){
  e.preventDefault();
  var err=document.getElementById('err'); err.textContent='';
  try{
    var r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:document.getElementById('pw').value})});
    if(r.ok){ location.href='/'; return; }
    err.textContent=(await r.json()).error||'Sign-in failed';
  }catch(ex){ err.textContent='Network error — try again'; }
});
</script>
</body>
</html>
